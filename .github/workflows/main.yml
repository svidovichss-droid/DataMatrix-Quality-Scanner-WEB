name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install system dependencies
      run: |
        choco install -y vcredist140 --no-progress
        pip install --upgrade pip

    - name: Install Python dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller>=6.0.0

    - name: Create assets directory
      run: |
        New-Item -ItemType Directory -Force -Path "assets"
        if (-not (Test-Path "assets\.gitkeep")) {
          "Placeholder" | Out-File -FilePath "assets\.gitkeep" -Encoding utf8
        }

    - name: Build EXE
      run: |
        $ErrorActionPreference = "Stop"
        
        # Создаем директорию assets если не существует
        if (-not (Test-Path "assets")) {
          New-Item -ItemType Directory -Force -Path "assets"
        }
        
        $iconArg = ""
        if (Test-Path "assets\icon.ico") {
          $iconArg = "--icon=assets\icon.ico"
        }
        
        Write-Host "Building with arguments: $iconArg"
        
        $pyinstallerArgs = @(
          "--name", "DM-Quality-Scanner",
          "--windowed",
          "--onefile",
          "--add-data", "scanner;scanner",
          "--add-data", "src\ui;ui",
          "--add-data", "src\utils;utils"
        )
        
        if ($iconArg) {
          $pyinstallerArgs += $iconArg
        }
        
        $pyinstallerArgs += "src/main.py"
        
        Write-Host "Running: pyinstaller $($pyinstallerArgs -join ' ')"
        & pyinstaller @pyinstallerArgs
        
        Write-Host "Build completed"

    - name: Verify build
      run: |
        if (Test-Path "dist\DM-Quality-Scanner.exe") {
          Write-Host "Build successful!"
          Get-Item "dist\DM-Quality-Scanner.exe" | Select-Object Name, Length
        } else {
          Write-Error "Build failed - EXE not found"
          dir dist
          exit 1
        }

    - name: Create distribution
      run: |
        New-Item -ItemType Directory -Force -Path "dist\DM-Quality-Scanner-Portable"
        Copy-Item "dist\DM-Quality-Scanner.exe" "dist\DM-Quality-Scanner-Portable\"
        Copy-Item "README.md" "dist\DM-Quality-Scanner-Portable\" -ErrorAction SilentlyContinue
        if (Test-Path "assets") {
          Copy-Item -Recurse "assets" "dist\DM-Quality-Scanner-Portable\"
        }

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: DM-Quality-Scanner-Windows
        path: dist/DM-Quality-Scanner-Portable
        retention-days: 30

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/DM-Quality-Scanner.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Zip portable version
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        Compress-Archive -Path "dist\DM-Quality-Scanner-Portable\*" -DestinationPath "dist\DM-Quality-Scanner-Portable.zip" -Force

    - name: Upload release asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/DM-Quality-Scanner-Portable.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
